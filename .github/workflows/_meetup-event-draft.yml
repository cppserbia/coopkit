name: coopkit / Meetup Event Draft (reusable)

# Reusable workflow that creates a Meetup.com Draft event from a PR. The
# consumer repo provides a thin caller workflow with `on: pull_request: labeled`
# and references this via `uses:`. Author-association and fork checks happen
# inside this workflow so the caller stays trivial.

on:
  workflow_call:
    inputs:
      label:
        description: PR label that triggers the workflow.
        type: string
        default: meetup-event
      events-glob:
        description: Regex matching candidate event files (POSIX ERE, anchored).
        type: string
        default: '^events/.*\.md$'
      events-exclude:
        description: Regex excluding files from the match (e.g. templates).
        type: string
        default: '^events/_'
      config-path:
        description: Path to coopkit.config.json in the caller's repo.
        type: string
        default: coopkit.config.json
      package-version:
        description: '@coopkit/meetup version to invoke (npm dist-tag or semver).'
        type: string
        default: latest
      bun-version:
        description: Bun version to use on the runner.
        type: string
        default: "1.3.13"
      bot-name:
        description: Git user.name for the writeback commit.
        type: string
        default: coopkit-bot
      bot-email:
        description: Git user.email for the writeback commit.
        type: string
        default: 41898282+github-actions[bot]@users.noreply.github.com
      commit-message:
        description: Commit message subject for the writeback.
        type: string
        default: "chore(meetup): add draft event URL"
    secrets:
      MEETUP_CLIENT_KEY:
        description: OAuth consumer key for the Meetup app.
        required: true
      MEETUP_MEMBER_ID:
        description: Meetup member ID of a group organizer.
        required: true
      MEETUP_SIGNING_KEY_ID:
        description: JWT signing key ID.
        required: true
      MEETUP_PRIVATE_KEY:
        description: Contents of the JWT signing private-key PEM.
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  create-draft:
    # Fork PRs cannot use GITHUB_TOKEN to push back; gate to same-repo PRs.
    # Author association is restricted to project insiders.
    if: |
      github.event.label.name == inputs.label &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (github.event.pull_request.author_association == 'OWNER' ||
       github.event.pull_request.author_association == 'MEMBER' ||
       github.event.pull_request.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Find event file
        id: find-event
        env:
          GH_TOKEN: ${{ github.token }}
          EVENTS_GLOB: ${{ inputs.events-glob }}
          EVENTS_EXCLUDE: ${{ inputs.events-exclude }}
        run: |
          set -euo pipefail
          PR_NUMBER=${{ github.event.pull_request.number }}

          EVENT_FILE=$(gh pr diff "$PR_NUMBER" --name-only \
            | grep -E "$EVENTS_GLOB" | grep -Ev "$EVENTS_EXCLUDE" || true)

          if [ -z "$EVENT_FILE" ]; then
            echo "::error::No event files changed in this PR. The '${{ inputs.label }}' label requires a PR that touches an event file matching $EVENTS_GLOB."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          FILE_COUNT=$(echo "$EVENT_FILE" | wc -l | tr -d ' ')
          if [ "$FILE_COUNT" -ne 1 ]; then
            echo "::error::Expected exactly 1 event file, found $FILE_COUNT. Each PR should contain a single event."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "Found event file: $EVENT_FILE"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "file=$EVENT_FILE" >> "$GITHUB_OUTPUT"

      - name: Write Meetup private key
        id: key
        env:
          MEETUP_PRIVATE_KEY: ${{ secrets.MEETUP_PRIVATE_KEY }}
        run: |
          KEY_PATH="$RUNNER_TEMP/meetup-private-key.pem"
          printf '%s' "$MEETUP_PRIVATE_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "path=$KEY_PATH" >> "$GITHUB_OUTPUT"

      - name: Create Meetup draft event
        id: create
        env:
          MEETUP_CLIENT_KEY: ${{ secrets.MEETUP_CLIENT_KEY }}
          MEETUP_MEMBER_ID: ${{ secrets.MEETUP_MEMBER_ID }}
          MEETUP_SIGNING_KEY_ID: ${{ secrets.MEETUP_SIGNING_KEY_ID }}
          MEETUP_PRIVATE_KEY_PATH: ${{ steps.key.outputs.path }}
        run: |
          set -euo pipefail
          FILE="${{ steps.find-event.outputs.file }}"

          # Capture the pre-run event_url so we can detect idempotent skips.
          BEFORE=$(grep -E '^event_url:' "$FILE" || true)

          bunx --bun @coopkit/meetup@${{ inputs.package-version }} create \
            --config "${{ inputs.config-path }}" \
            "$FILE"

          AFTER=$(grep -E '^event_url:' "$FILE" || true)

          if [ "$BEFORE" = "$AFTER" ]; then
            echo "No frontmatter changes (likely already had event_id). Skipping commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            EVENT_URL=$(grep -E '^event_url:' "$FILE" | sed -E 's/^event_url:\s*//; s/^["'\'']//; s/["'\'']$//')
            echo "event_url=$EVENT_URL" >> "$GITHUB_OUTPUT"
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit Meetup URL back to PR
        if: steps.create.outputs.committed == 'true'
        env:
          FILE: ${{ steps.find-event.outputs.file }}
        run: |
          set -euo pipefail
          git config user.name "${{ inputs.bot-name }}"
          git config user.email "${{ inputs.bot-email }}"
          git add "$FILE"
          git commit -m "${{ inputs.commit-message }}"
          git push

      - name: Comment on PR
        if: steps.create.outputs.committed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const eventUrl = '${{ steps.create.outputs.event_url }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `✅ Created Meetup draft: ${eventUrl}\n\nThe draft is visible to group organizers only. Review and publish it from the Meetup dashboard when ready.`
            });

      - name: Clean up private key
        if: always() && steps.key.outputs.path != ''
        run: rm -f "${{ steps.key.outputs.path }}"

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `❌ Failed to create Meetup draft. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`
            });
