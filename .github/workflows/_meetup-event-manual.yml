name: coopkit / Meetup Event Manual (reusable)

# Reusable workflow that creates a Meetup.com Draft event from form inputs.
# Designed for `workflow_dispatch` callers: a maintainer opens the Actions
# tab, fills in title/date/venue/etc., hits Run. No source-of-truth coupling —
# the caller only needs a coopkit.config.json with the venue map.

on:
  workflow_call:
    inputs:
      title:
        description: Event title.
        type: string
        required: true
      date:
        description: ISO-8601 datetime in UTC (e.g. 2026-05-09T16:00:00Z).
        type: string
        required: true
      duration:
        description: ISO-8601 duration (e.g. PT1H30M).
        type: string
        required: false
        default: PT2H
      venue-key:
        description: Venue key — must exist in coopkit.config.json `meetup.venues`.
        type: string
        required: true
      description:
        description: Event description (Markdown allowed).
        type: string
        required: false
        default: ""
      image-url:
        description: Public URL of a featured photo to attach (optional).
        type: string
        required: false
        default: ""
      id:
        description: Event identifier. Auto-derived from date + title slug if omitted.
        type: string
        required: false
        default: ""
      dry-run:
        description: Print the payload without calling the Meetup API.
        type: boolean
        required: false
        default: false
      config-path:
        description: Path to coopkit.config.json in the caller's repo.
        type: string
        required: false
        default: coopkit.config.json
      package-version:
        description: '@coopkit/meetup version to invoke.'
        type: string
        required: false
        default: latest
      bun-version:
        description: Bun version to use on the runner.
        type: string
        required: false
        default: "1.3.13"
    secrets:
      MEETUP_CLIENT_KEY:
        description: OAuth consumer key.
        required: true
      MEETUP_MEMBER_ID:
        description: Meetup member ID of a group organizer.
        required: true
      MEETUP_SIGNING_KEY_ID:
        description: JWT signing key ID.
        required: true
      MEETUP_PRIVATE_KEY:
        description: Contents of the JWT signing private-key PEM.
        required: true

permissions:
  contents: read

jobs:
  create-draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Write Meetup private key
        id: key
        env:
          MEETUP_PRIVATE_KEY: ${{ secrets.MEETUP_PRIVATE_KEY }}
        run: |
          KEY_PATH="$RUNNER_TEMP/meetup-private-key.pem"
          printf '%s' "$MEETUP_PRIVATE_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "path=$KEY_PATH" >> "$GITHUB_OUTPUT"

      - name: Build NormalizedEvent JSON
        id: build
        env:
          TITLE: ${{ inputs.title }}
          DATE: ${{ inputs.date }}
          DURATION: ${{ inputs.duration }}
          VENUE_KEY: ${{ inputs.venue-key }}
          DESCRIPTION: ${{ inputs.description }}
          IMAGE_URL: ${{ inputs.image-url }}
          USER_ID: ${{ inputs.id }}
        run: |
          set -euo pipefail
          if [ -z "$USER_ID" ]; then
            # Auto-derive: YYYY-MM-DD from date + slugified title.
            DATE_PART=$(printf '%s' "$DATE" | cut -c1-10)
            SLUG=$(printf '%s' "$TITLE" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g' \
              | cut -c1-50)
            USER_ID="${DATE_PART}-${SLUG}"
          fi
          EVENT_JSON_PATH="$RUNNER_TEMP/event.json"

          # Use jq to build the JSON so values with quotes/newlines are escaped safely.
          jq -n \
            --arg id "$USER_ID" \
            --arg title "$TITLE" \
            --arg date "$DATE" \
            --arg duration "$DURATION" \
            --arg venueKey "$VENUE_KEY" \
            --arg description "$DESCRIPTION" \
            --arg imageUrl "$IMAGE_URL" \
            '{
              id: $id,
              title: $title,
              date: $date,
              duration: $duration,
              venueKey: $venueKey
            }
            + (if $description == "" then {} else {description: $description} end)
            + (if $imageUrl == "" then {} else {imageUrl: $imageUrl} end)' \
            > "$EVENT_JSON_PATH"

          echo "event-json=$EVENT_JSON_PATH" >> "$GITHUB_OUTPUT"
          echo "--- NormalizedEvent ---"
          cat "$EVENT_JSON_PATH"

      - name: Create Meetup draft event
        env:
          MEETUP_CLIENT_KEY: ${{ secrets.MEETUP_CLIENT_KEY }}
          MEETUP_MEMBER_ID: ${{ secrets.MEETUP_MEMBER_ID }}
          MEETUP_SIGNING_KEY_ID: ${{ secrets.MEETUP_SIGNING_KEY_ID }}
          MEETUP_PRIVATE_KEY_PATH: ${{ steps.key.outputs.path }}
        run: |
          set -euo pipefail
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          bunx --bun "@coopkit/meetup@${{ inputs.package-version }}" create-from-json \
            --config "${{ inputs.config-path }}" \
            $DRY_RUN_FLAG \
            "${{ steps.build.outputs.event-json }}"

      - name: Clean up private key
        if: always() && steps.key.outputs.path != ''
        run: rm -f "${{ steps.key.outputs.path }}"
